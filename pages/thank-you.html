<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — zanmanna</title>
  <link rel="icon" href="../assets/icons/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:       #F5EEE4;
      --cream-light: #FAF6F0;
      --taupe:       #8B7A69;
      --taupe-light: #C4B5A5;
      --taupe-dark:  #6B5D4F;
      --dark:        #2C2B29;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream-light);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--dark);
      border-radius: 24px;
      padding: 64px 56px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      height: 22px;
      filter: brightness(0) saturate(100%) invert(95%) sepia(10%) saturate(300%) hue-rotate(330deg) brightness(103%);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(245,238,228,0.15);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--cream);
    }

    p {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(245,238,228,0.6);
      max-width: 360px;
    }

    .btn-home {
      display: inline-block;
      margin-top: 8px;
      padding: 13px 28px;
      border: 1.5px solid rgba(245,238,228,0.3);
      border-radius: 980px;
      font-size: 14px;
      font-weight: 500;
      color: var(--cream);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
    }

    .btn-home:hover {
      background: rgba(245,238,228,0.08);
      border-color: rgba(245,238,228,0.6);
    }

    @media (max-width: 480px) {
      .card { padding: 48px 32px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="../assets/images/zanmanna_logo.svg" alt="zanmanna" />
    <div class="divider"></div>
    <h1>Thank you for reaching out.</h1>
    <p>Your message means a lot to us. We will get back to you soon. Much love from the zanmanna team.</p>
    <a href="../index.html" class="btn-home">Back to home ↑</a>
  </div>

</body>
</html>
