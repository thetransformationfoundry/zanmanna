<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Aid — ZanManna</title>
  <link rel="icon" href="../../assets/icons/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:       #F5EEE4;
      --cream-light: #FAF6F0;
      --taupe:       #8B7A69;
      --taupe-light: #C4B5A5;
      --taupe-dark:  #6B5D4F;
      --dark:        #2C2B29;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream-light);
      color: var(--dark);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(250,246,240,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(139,122,105,0.12);
    }

    nav img.logo { height: 20px; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-tool-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--taupe);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #lock-btn {
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
      background: transparent;
      border: 1.5px solid rgba(44,43,41,0.2);
      padding: 6px 16px;
      border-radius: 980px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.2s ease;
      display: none;
    }
    #lock-btn:hover { background: rgba(44,43,41,0.06); border-color: rgba(44,43,41,0.35); }

    /* ── PIN SCREEN ── */
    #pin-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
      animation: fadeUp 0.5s ease forwards;
    }

    .pin-card {
      background: var(--dark);
      border-radius: 24px;
      padding: 56px 52px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .pin-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--taupe-light);
      margin-bottom: 14px;
    }

    .pin-title {
      font-family: 'Lora', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .pin-sub {
      font-size: 14px;
      color: rgba(245,238,228,0.45);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .pin-input {
      width: 100%;
      background: rgba(245,238,228,0.07);
      border: 1.5px solid rgba(245,238,228,0.15);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--cream);
      outline: none;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    .pin-input::placeholder { color: rgba(245,238,228,0.25); }
    .pin-input:focus { border-color: rgba(245,238,228,0.4); }
    .pin-input.error { border-color: #c0605a; animation: shake 0.35s ease; }

    .pin-btn {
      width: 100%;
      padding: 14px 20px;
      background: var(--cream);
      color: var(--dark);
      border: none;
      border-radius: 980px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 4px;
    }
    .pin-btn:hover { background: #fff; }

    .pin-error {
      font-size: 13px;
      color: #e07a75;
      margin-top: 12px;
      min-height: 18px;
      display: none;
    }

    /* ── TOOL SCREEN ── */
    #tool-screen {
      display: none;
      padding: 88px 1.5rem 4rem;
    }

    .tool-screen-inner {
      max-width: 900px;
      margin: 0 auto;
      animation: fadeUp 0.5s ease forwards;
    }

    .page-title {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 14px;
      color: var(--taupe);
      margin-bottom: 2rem;
    }

    .mode-row {
      display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--taupe-light);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--taupe);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: var(--taupe);
      color: var(--cream);
      border-color: var(--taupe);
    }
    .mode-btn:hover:not(.active) { border-color: var(--taupe); }

    .input-area {
      width: 100%;
      min-height: 180px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--taupe-light);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--dark);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-area:focus { border-color: var(--taupe); }
    .input-area::placeholder { color: var(--taupe-light); }

    .char-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; margin-bottom: 1.2rem;
    }
    .char-count { font-size: 12px; color: var(--taupe-light); }

    .polish-btn {
      display: block; width: 100%;
      padding: 14px 20px;
      background: var(--dark);
      color: var(--cream);
      border: none; border-radius: 980px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; letter-spacing: -0.01em;
      transition: opacity 0.2s;
    }
    .polish-btn:hover { opacity: 0.82; }
    .polish-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading-msg {
      margin-top: 1.2rem;
      font-size: 13px; color: var(--taupe);
      font-style: italic; text-align: center;
      display: none;
    }

    .results { margin-top: 2rem; display: none; }

    .divider {
      border: none;
      border-top: 1px solid var(--taupe-light);
      opacity: 0.4;
      margin: 1.5rem 0;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 620px) { .results-grid { grid-template-columns: 1fr; } }

    .result-panel {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(196,181,165,0.4);
      border-radius: 10px;
      padding: 1.2rem;
    }
    .panel-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--taupe-light); margin-bottom: 0.8rem;
    }
    .panel-text {
      font-family: 'Inter', sans-serif;
      font-size: 14px; line-height: 1.75;
      color: var(--dark);
      white-space: pre-wrap; word-break: break-word;
    }

    .changes-block { margin-top: 1.5rem; }
    .changes-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--taupe-light); margin-bottom: 0.8rem;
    }
    .change-item {
      display: flex; gap: 10px; align-items: baseline;
      margin-bottom: 0.5rem;
      font-size: 13px; line-height: 1.6;
    }
    .change-dot {
      width: 5px; height: 5px;
      background: var(--taupe-light);
      border-radius: 50%; flex-shrink: 0; margin-top: 7px;
    }
    .change-text { color: var(--dark); }

    .copy-btn {
      margin-top: 1rem; padding: 8px 18px;
      background: transparent;
      border: 1.5px solid rgba(139,122,105,0.35);
      border-radius: 980px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--taupe); cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--taupe); background: rgba(139,122,105,0.06); }

    .error-msg {
      margin-top: 1rem; font-size: 13px;
      color: #8B3A3A; display: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .pin-card { padding: 40px 32px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../../index.html">
      <img class="logo" src="../../assets/images/zanmanna_logo_dark.svg" alt="ZanManna" />
    </a>
    <div class="nav-right">
      <span class="nav-tool-label">Writing Aid</span>
      <button id="lock-btn" onclick="lock()">Lock</button>
    </div>
  </nav>

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <div class="pin-card">
      <p class="pin-eyebrow">Admin Access</p>
      <h1 class="pin-title">Writing Aid</h1>
      <p class="pin-sub">Enter your access code to continue.</p>
      <input
        class="pin-input"
        id="pin-input"
        type="password"
        placeholder="Access code"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') verify()"
      />
      <button class="pin-btn" onclick="verify()">Continue →</button>
      <p class="pin-error" id="pin-error">Incorrect code. Please try again.</p>
    </div>
  </div>

  <!-- TOOL SCREEN -->
  <div id="tool-screen">
    <div class="tool-screen-inner">

      <div class="page-title">Writing Aid</div>
      <p class="page-sub">Paste your draft below. Choose a writing mode, then polish.</p>

      <div class="mode-row">
        <button class="mode-btn active" onclick="setMode('devotional', this)">Devotional</button>
        <button class="mode-btn" onclick="setMode('pastoral', this)">Pastoral / Email</button>
        <button class="mode-btn" onclick="setMode('sermon', this)">Sermon / Teaching</button>
        <button class="mode-btn" onclick="setMode('general', this)">General</button>
      </div>

      <textarea class="input-area" id="input" placeholder="Paste or type your draft here..." oninput="updateChar()"></textarea>

      <div class="char-row">
        <span class="char-count" id="char-count">0 words</span>
        <span class="char-count">Mode: <span id="mode-label">Devotional</span></span>
      </div>

      <button class="polish-btn" id="polish-btn" onclick="polish()">Polish My Writing</button>
      <div class="loading-msg" id="loading-msg">Reading your draft carefully...</div>
      <div class="error-msg" id="error-msg"></div>

      <div class="results" id="results">
        <hr class="divider">
        <div class="results-grid">
          <div class="result-panel">
            <div class="panel-label">Your Original</div>
            <div class="panel-text" id="original-text"></div>
          </div>
          <div class="result-panel">
            <div class="panel-label">Polished Version</div>
            <div class="panel-text" id="corrected-text"></div>
            <button class="copy-btn" onclick="copyText()">Copy to clipboard</button>
          </div>
        </div>
        <div class="changes-block" id="changes-block">
          <div class="changes-label">What was improved</div>
          <div id="changes-list"></div>
        </div>
      </div>

    </div>
  </div>

<script>
  const PASS = 'changetheworldwithlove@2026!';
  const SESSION_KEY = 'zanmanna_wa_auth';

  // Check session on load
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    showTool();
  }

  function verify() {
    const input = document.getElementById('pin-input');
    const errEl = document.getElementById('pin-error');
    if (input.value === PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showTool();
    } else {
      input.classList.add('error');
      errEl.style.display = 'block';
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 400);
      input.focus();
    }
  }

  function showTool() {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('tool-screen').style.display = 'block';
    document.getElementById('lock-btn').style.display = 'inline-block';
  }

  function lock() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('tool-screen').style.display = 'none';
    document.getElementById('lock-btn').style.display = 'none';
    document.getElementById('pin-screen').style.display = 'flex';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').style.display = 'none';
  }

  // ── TOOL LOGIC ──
  let currentMode = 'devotional';

  const modePrompts = {
    devotional: "You are a careful editor for devotional and spiritual writing. The voice should be warm, pastoral, grounded in scripture, and accessible. Preserve the author's personal voice and faith perspective. Do not make it more formal or academic.",
    pastoral:   "You are a careful editor for pastoral correspondence — emails, letters, and ministry communications. The tone should be warm, professional, clear, and genuine. Preserve the author's personal voice.",
    sermon:     "You are a careful editor for sermon and teaching content. The voice should be clear, engaging, and accessible for a congregation. Preserve the author's theological perspective and preaching style.",
    general:    "You are a careful editor for general writing. Correct spelling, grammar, and improve clarity while preserving the author's voice and intent."
  };

  const modeLabels = {
    devotional: 'Devotional',
    pastoral:   'Pastoral / Email',
    sermon:     'Sermon / Teaching',
    general:    'General'
  };

  function setMode(mode, btn) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mode-label').textContent = modeLabels[mode];
  }

  function updateChar() {
    const txt = document.getElementById('input').value.trim();
    const words = txt ? txt.split(/\s+/).length : 0;
    document.getElementById('char-count').textContent = words + ' word' + (words !== 1 ? 's' : '');
  }

  async function polish() {
    const input = document.getElementById('input').value.trim();
    if (!input) return;

    const btn     = document.getElementById('polish-btn');
    const loading = document.getElementById('loading-msg');
    const errEl   = document.getElementById('error-msg');
    const results = document.getElementById('results');

    btn.disabled = true;
    loading.style.display = 'block';
    errEl.style.display   = 'none';
    results.style.display = 'none';

    const systemPrompt = modePrompts[currentMode] + `

Return ONLY a valid JSON object with exactly these fields:
{
  "corrected": "the full polished version of the text",
  "changes": ["brief description of change 1", "brief description of change 2", ...]
}

The "changes" array should list 3-6 concise improvements made (spelling, grammar, clarity, flow, punctuation). Do not include any text outside the JSON object.`;

    try {
      const resp = await fetch('https://writing-aid-proxy.zanmanna.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2048,
          system: systemPrompt,
          messages: [{ role: 'user', content: `Please polish this text:\n\n${input}` }]
        })
      });

      const data  = await resp.json();
      console.log('API response:', JSON.stringify(data));
      const raw   = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
      const clean = raw.replace(/```json|```/g, '').trim();
      console.log('Parsed text:', clean);
      const parsed = JSON.parse(clean);

      document.getElementById('original-text').textContent  = input;
      document.getElementById('corrected-text').textContent = parsed.corrected;

      const changesList = document.getElementById('changes-list');
      changesList.innerHTML = '';
      (parsed.changes || []).forEach(c => {
        const div  = document.createElement('div');
        div.className = 'change-item';
        const dot  = document.createElement('span');
        dot.className = 'change-dot';
        const text = document.createElement('span');
        text.className = 'change-text';
        text.textContent = c;
        div.appendChild(dot);
        div.appendChild(text);
        changesList.appendChild(div);
      });

      results.style.display = 'block';
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch(e) {
      errEl.textContent    = 'Something went wrong: ' + e.message;
      errEl.style.display  = 'block';
    } finally {
      btn.disabled          = false;
      loading.style.display = 'none';
    }
  }

  async function copyText() {
    const text = document.getElementById('corrected-text').textContent;
    try {
      await navigator.clipboard.writeText(text);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
    } catch(e) {}
  }
</script>
</body>
</html>
